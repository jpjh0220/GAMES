name: Temporary Unity Editor Transfer

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "unity-transfer/**"

permissions:
  actions: write
  contents: read

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      ARCHIVE_NAME: Unity-6000.3.16f1.tar.xz
      ARCHIVE_URL: https://download.unity3d.com/download_unity/a56f230f6470/LinuxEditorInstaller/Unity-6000.3.16f1.tar.xz
      CHUNK_MIB: "450"
    steps:
      - name: Check out transfer branch
        uses: actions/checkout@v4

      - name: Read requested chunk
        id: request
        shell: bash
        run: |
          set -euo pipefail
          INDEX="$(tr -d '[:space:]' < unity-transfer/chunk-index.txt)"
          [[ "$INDEX" =~ ^-?[0-9]+$ ]] || { echo "Invalid chunk index: $INDEX" >&2; exit 1; }
          echo "index=$INDEX" >> "$GITHUB_OUTPUT"

      - name: Remove previous temporary transfer artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.name | startswith("unity-editor-transfer-")) | .id' \
            | while read -r artifact_id; do
                [[ -z "$artifact_id" ]] && continue
                gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}"
              done

      - name: Restore cached Unity archive
        if: steps.request.outputs.index != '-1'
        uses: actions/cache@v4
        with:
          path: /tmp/Unity-6000.3.16f1.tar.xz
          key: unity-editor-6000.3.16f1-a56f230f6470

      - name: Fetch and validate official Unity archive
        if: steps.request.outputs.index != '-1'
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE="/tmp/${ARCHIVE_NAME}"
          if [[ ! -s "$ARCHIVE" ]]; then
            curl --fail --location --retry 5 --retry-all-errors \
              --output "$ARCHIVE.part" "$ARCHIVE_URL"
            mv "$ARCHIVE.part" "$ARCHIVE"
          fi
          xz --test "$ARCHIVE"
          sha256sum "$ARCHIVE" | tee /tmp/unity-archive.sha256
          stat --printf='%s\n' "$ARCHIVE" | tee /tmp/unity-archive.bytes

      - name: Create probe artifact
        if: steps.request.outputs.index == '-1'
        shell: bash
        run: |
          mkdir -p /tmp/unity-transfer-output
          printf 'GitHub transfer bridge operational\n' > /tmp/unity-transfer-output/probe.txt

      - name: Create requested archive chunk
        if: steps.request.outputs.index != '-1'
        shell: bash
        env:
          INDEX: ${{ steps.request.outputs.index }}
        run: |
          set -euo pipefail
          ARCHIVE="/tmp/${ARCHIVE_NAME}"
          OUT_DIR=/tmp/unity-transfer-output
          mkdir -p "$OUT_DIR"
          TOTAL_BYTES="$(stat --printf='%s' "$ARCHIVE")"
          CHUNK_BYTES=$((CHUNK_MIB * 1024 * 1024))
          CHUNK_COUNT=$(((TOTAL_BYTES + CHUNK_BYTES - 1) / CHUNK_BYTES))
          (( INDEX >= 0 && INDEX < CHUNK_COUNT )) || {
            echo "Chunk index $INDEX is outside 0..$((CHUNK_COUNT - 1))" >&2
            exit 1
          }
          PART_NAME="${ARCHIVE_NAME}.part-$(printf '%03d' "$INDEX")"
          dd if="$ARCHIVE" of="$OUT_DIR/$PART_NAME" \
            bs=1M skip=$((INDEX * CHUNK_MIB)) count="$CHUNK_MIB" status=progress
          PART_SHA="$(sha256sum "$OUT_DIR/$PART_NAME" | awk '{print $1}')"
          ARCHIVE_SHA="$(awk '{print $1}' /tmp/unity-archive.sha256)"
          PART_BYTES="$(stat --printf='%s' "$OUT_DIR/$PART_NAME")"
          cat > "$OUT_DIR/manifest.txt" <<EOF
          archive_name=${ARCHIVE_NAME}
          archive_url=${ARCHIVE_URL}
          archive_bytes=${TOTAL_BYTES}
          archive_sha256=${ARCHIVE_SHA}
          chunk_size_bytes=${CHUNK_BYTES}
          chunk_count=${CHUNK_COUNT}
          chunk_index=${INDEX}
          part_name=${PART_NAME}
          part_bytes=${PART_BYTES}
          part_sha256=${PART_SHA}
          EOF

      - name: Upload temporary transfer artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-editor-transfer-${{ steps.request.outputs.index }}
          path: /tmp/unity-transfer-output/
          compression-level: 0
          retention-days: 1
          if-no-files-found: error
