name: Temporary Unity Editor Transfer

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "unity-transfer/**"
      - ".github/workflows/unity-editor-transfer.yml"

permissions:
  actions: write
  contents: read

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ARCHIVE_NAME: Unity-6000.3.16f1.tar.xz
      ARCHIVE_URL: https://download.unity3d.com/download_unity/a56f230f6470/LinuxEditorInstaller/Unity-6000.3.16f1.tar.xz
      CHUNK_MIB: "400"
    steps:
      - name: Check out transfer branch
        uses: actions/checkout@v4

      - name: Read requested chunk
        id: request
        shell: bash
        run: |
          set -euo pipefail
          RAW_INDEX="$(tr -d '[:space:]' < unity-transfer/chunk-index.txt)"
          [[ "$RAW_INDEX" =~ ^-?[0-9]+$ ]] || { echo "Invalid chunk index: $RAW_INDEX" >&2; exit 1; }
          if [[ "$RAW_INDEX" == "-1" ]]; then
            INDEX=-1
          else
            INDEX=$((10#$RAW_INDEX))
          fi
          echo "index=$INDEX" >> "$GITHUB_OUTPUT"

      - name: Remove previous temporary transfer artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.name | startswith("unity-editor-transfer-")) | .id' \
            | while read -r artifact_id; do
                [[ -z "$artifact_id" ]] && continue
                gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}"
              done

      - name: Create probe artifact
        if: steps.request.outputs.index == '-1'
        shell: bash
        run: |
          mkdir -p /tmp/unity-transfer-output
          printf 'GitHub transfer bridge operational\n' > /tmp/unity-transfer-output/probe.txt

      - name: Download requested range
        if: steps.request.outputs.index != '-1'
        shell: bash
        env:
          INDEX: ${{ steps.request.outputs.index }}
        run: |
          set -euo pipefail
          OUT_DIR=/tmp/unity-transfer-output
          mkdir -p "$OUT_DIR"
          CHUNK_BYTES=$((CHUNK_MIB * 1024 * 1024))
          START=$((INDEX * CHUNK_BYTES))
          END=$((START + CHUNK_BYTES - 1))
          PART_NAME="${ARCHIVE_NAME}.part-$(printf '%03d' "$INDEX")"
          HEADER_FILE=/tmp/unity-range.headers

          curl --fail --location --retry 5 --retry-all-errors \
            --range "${START}-${END}" \
            --dump-header "$HEADER_FILE" \
            --output "$OUT_DIR/$PART_NAME" \
            "$ARCHIVE_URL"

          STATUS="$(awk 'toupper($1) ~ /^HTTP\// {code=$2} END {print code}' "$HEADER_FILE")"
          CONTENT_RANGE="$(awk 'BEGIN{IGNORECASE=1} /^content-range:/ {gsub("\r",""); print $2}' "$HEADER_FILE" | tail -1)"
          [[ "$STATUS" == "206" ]] || { echo "Server did not honor byte range; HTTP $STATUS" >&2; cat "$HEADER_FILE" >&2; exit 1; }
          [[ "$CONTENT_RANGE" =~ ^bytes[[:space:]]+([0-9]+)-([0-9]+)/([0-9]+)$ ]] || { echo "Invalid Content-Range: $CONTENT_RANGE" >&2; cat "$HEADER_FILE" >&2; exit 1; }

          ACTUAL_START="${BASH_REMATCH[1]}"
          ACTUAL_END="${BASH_REMATCH[2]}"
          TOTAL_BYTES="${BASH_REMATCH[3]}"
          [[ "$ACTUAL_START" == "$START" ]] || { echo "Unexpected range start $ACTUAL_START" >&2; exit 1; }

          CHUNK_COUNT=$(((TOTAL_BYTES + CHUNK_BYTES - 1) / CHUNK_BYTES))
          (( INDEX >= 0 && INDEX < CHUNK_COUNT )) || { echo "Chunk index $INDEX is outside 0..$((CHUNK_COUNT - 1))" >&2; exit 1; }

          EXPECTED_END=$END
          (( EXPECTED_END >= TOTAL_BYTES )) && EXPECTED_END=$((TOTAL_BYTES - 1))
          [[ "$ACTUAL_END" == "$EXPECTED_END" ]] || { echo "Unexpected range end $ACTUAL_END; expected $EXPECTED_END" >&2; exit 1; }

          PART_BYTES="$(stat --printf='%s' "$OUT_DIR/$PART_NAME")"
          EXPECTED_BYTES=$((EXPECTED_END - START + 1))
          [[ "$PART_BYTES" == "$EXPECTED_BYTES" ]] || { echo "Unexpected part size $PART_BYTES; expected $EXPECTED_BYTES" >&2; exit 1; }
          PART_SHA="$(sha256sum "$OUT_DIR/$PART_NAME" | awk '{print $1}')"

          cat > "$OUT_DIR/manifest.txt" <<EOF
          archive_name=${ARCHIVE_NAME}
          archive_url=${ARCHIVE_URL}
          archive_bytes=${TOTAL_BYTES}
          chunk_size_bytes=${CHUNK_BYTES}
          chunk_count=${CHUNK_COUNT}
          chunk_index=${INDEX}
          range_start=${START}
          range_end=${EXPECTED_END}
          part_name=${PART_NAME}
          part_bytes=${PART_BYTES}
          part_sha256=${PART_SHA}
          EOF

      - name: Upload temporary transfer artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-editor-transfer-${{ steps.request.outputs.index }}
          path: /tmp/unity-transfer-output/
          compression-level: 0
          retention-days: 1
          if-no-files-found: error
