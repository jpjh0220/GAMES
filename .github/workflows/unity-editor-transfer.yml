name: Temporary Unity Editor Transfer

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "unity-transfer/**"
      - ".github/workflows/unity-editor-transfer.yml"

permissions:
  actions: write
  contents: read

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      ARCHIVE_NAME: Unity-6000.3.16f1.tar.xz
      ARCHIVE_URL: https://download.unity3d.com/download_unity/a56f230f6470/LinuxEditorInstaller/Unity-6000.3.16f1.tar.xz
      ARCHIVE_BYTES: "4501178040"
      ARCHIVE_SHA256: d2db0e1db5688df99c5c3517a590c4149899588e34e9be0deb49ac949a03082d
      CHUNK_MIB: "300"
      CHUNK_BYTES: "314572800"
      CHUNK_COUNT: "15"
      CACHE_KEY: unity-editor-6000.3.16f1-a56f230f6470
    steps:
      - name: Check out transfer branch
        uses: actions/checkout@v4

      - name: Read starting chunk
        id: request
        shell: bash
        run: |
          set -euo pipefail
          RAW_INDEX="$(tr -d '[:space:]' < unity-transfer/chunk-index.txt)"
          [[ "$RAW_INDEX" =~ ^[0-9]+$ ]] || { echo "Invalid chunk index: $RAW_INDEX" >&2; exit 1; }
          START_INDEX=$((10#$RAW_INDEX))
          SECOND_INDEX=$((START_INDEX + 1))
          (( START_INDEX >= 0 && START_INDEX < CHUNK_COUNT )) || { echo "Invalid start chunk $START_INDEX" >&2; exit 1; }
          echo "start=$START_INDEX" >> "$GITHUB_OUTPUT"
          echo "second=$SECOND_INDEX" >> "$GITHUB_OUTPUT"
          if (( SECOND_INDEX < CHUNK_COUNT )); then
            echo "has_second=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_second=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove previous temporary transfer artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.name | startswith("unity-editor-transfer-")) | .id' \
            | while read -r artifact_id; do
                [[ -z "$artifact_id" ]] && continue
                gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}"
              done

      - name: Restore validated Unity archive cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/Unity-6000.3.16f1.tar.xz
          key: ${{ env.CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Validate restored archive metadata
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE="/tmp/${ARCHIVE_NAME}"
          [[ -s "$ARCHIVE" ]] || { echo "Validated archive cache was not restored" >&2; exit 1; }
          [[ "$(stat --printf='%s' "$ARCHIVE")" == "$ARCHIVE_BYTES" ]] || { echo "Archive size mismatch" >&2; exit 1; }

      - name: Create first requested chunk
        shell: bash
        env:
          INDEX: ${{ steps.request.outputs.start }}
          SLOT: "0"
        run: |
          set -euo pipefail
          ARCHIVE="/tmp/${ARCHIVE_NAME}"
          OUT_DIR="/tmp/unity-transfer-output-${SLOT}"
          mkdir -p "$OUT_DIR"
          PART_NAME="${ARCHIVE_NAME}.part-$(printf '%03d' "$INDEX")"
          dd if="$ARCHIVE" of="$OUT_DIR/$PART_NAME" bs=1M skip=$((INDEX * CHUNK_MIB)) count="$CHUNK_MIB" status=progress
          PART_BYTES="$(stat --printf='%s' "$OUT_DIR/$PART_NAME")"
          PART_SHA="$(sha256sum "$OUT_DIR/$PART_NAME" | awk '{print $1}')"
          START=$((INDEX * CHUNK_BYTES))
          END=$((START + PART_BYTES - 1))
          printf '%s\n' \
            "archive_name=${ARCHIVE_NAME}" \
            "archive_url=${ARCHIVE_URL}" \
            "archive_bytes=${ARCHIVE_BYTES}" \
            "archive_sha256=${ARCHIVE_SHA256}" \
            "chunk_size_bytes=${CHUNK_BYTES}" \
            "chunk_count=${CHUNK_COUNT}" \
            "chunk_index=${INDEX}" \
            "range_start=${START}" \
            "range_end=${END}" \
            "part_name=${PART_NAME}" \
            "part_bytes=${PART_BYTES}" \
            "part_sha256=${PART_SHA}" > "$OUT_DIR/manifest.txt"

      - name: Create second requested chunk
        if: steps.request.outputs.has_second == 'true'
        shell: bash
        env:
          INDEX: ${{ steps.request.outputs.second }}
          SLOT: "1"
        run: |
          set -euo pipefail
          ARCHIVE="/tmp/${ARCHIVE_NAME}"
          OUT_DIR="/tmp/unity-transfer-output-${SLOT}"
          mkdir -p "$OUT_DIR"
          PART_NAME="${ARCHIVE_NAME}.part-$(printf '%03d' "$INDEX")"
          dd if="$ARCHIVE" of="$OUT_DIR/$PART_NAME" bs=1M skip=$((INDEX * CHUNK_MIB)) count="$CHUNK_MIB" status=progress
          PART_BYTES="$(stat --printf='%s' "$OUT_DIR/$PART_NAME")"
          PART_SHA="$(sha256sum "$OUT_DIR/$PART_NAME" | awk '{print $1}')"
          START=$((INDEX * CHUNK_BYTES))
          END=$((START + PART_BYTES - 1))
          printf '%s\n' \
            "archive_name=${ARCHIVE_NAME}" \
            "archive_url=${ARCHIVE_URL}" \
            "archive_bytes=${ARCHIVE_BYTES}" \
            "archive_sha256=${ARCHIVE_SHA256}" \
            "chunk_size_bytes=${CHUNK_BYTES}" \
            "chunk_count=${CHUNK_COUNT}" \
            "chunk_index=${INDEX}" \
            "range_start=${START}" \
            "range_end=${END}" \
            "part_name=${PART_NAME}" \
            "part_bytes=${PART_BYTES}" \
            "part_sha256=${PART_SHA}" > "$OUT_DIR/manifest.txt"

      - name: Upload first chunk
        uses: actions/upload-artifact@v4
        with:
          name: unity-editor-transfer-${{ steps.request.outputs.start }}
          path: /tmp/unity-transfer-output-0/
          compression-level: 0
          retention-days: 1
          if-no-files-found: error

      - name: Upload second chunk
        if: steps.request.outputs.has_second == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unity-editor-transfer-${{ steps.request.outputs.second }}
          path: /tmp/unity-transfer-output-1/
          compression-level: 0
          retention-days: 1
          if-no-files-found: error
