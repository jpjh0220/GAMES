name: llama.cpp runtime bridge

on:
  pull_request:
    paths:
      - '.qwen-transfer-trigger'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Build portable CPU llama.cpp runtime
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git
          cmake -S llama.cpp -B llama.cpp/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_STATIC=ON \
            -DGGML_NATIVE=OFF \
            -DLLAMA_CURL=OFF
          cmake --build llama.cpp/build --target llama-cli llama-server -j 2
          mkdir -p runtime/bin
          cp llama.cpp/build/bin/llama-cli runtime/bin/
          cp llama.cpp/build/bin/llama-server runtime/bin/
          chmod +x runtime/bin/*
          ldd runtime/bin/llama-cli || true
          tar -C runtime -czf llama-cpp-linux-x86_64.tar.gz .
      - name: Upload runtime
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-linux-x86-64
          path: llama-cpp-linux-x86_64.tar.gz
          compression-level: 0
          retention-days: 1
          if-no-files-found: error
