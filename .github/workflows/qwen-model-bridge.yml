name: Qwen model bridge

on:
  pull_request:
    paths:
      - '.qwen-transfer-trigger'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  download-qwen:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download Qwen2.5 0.5B Instruct Q4_K_M
        shell: bash
        run: |
          set -euxo pipefail
          URL='https://github.com/Hatk0/offline-models/releases/download/models-v1/qwen2.5-0.5b-instruct-q4_k_m.gguf'
          OUT='qwen2.5-0.5b-instruct-q4_k_m.gguf'
          curl -L --fail --retry 5 --retry-all-errors --connect-timeout 30 -o "$OUT" "$URL"
          test "$(stat -c%s "$OUT")" = '491400032'
          echo '74a4da8c9fdbcd15bd1f6d01d621410d31c6fc00986f5eb687824e7b93d7a9db  qwen2.5-0.5b-instruct-q4_k_m.gguf' | sha256sum -c -
          python3 - <<'PY'
          from pathlib import Path
          p = Path('qwen2.5-0.5b-instruct-q4_k_m.gguf')
          assert p.read_bytes()[:4] == b'GGUF'
          print('Verified GGUF:', p, p.stat().st_size)
          PY
      - name: Upload verified model
        uses: actions/upload-artifact@v4
        with:
          name: qwen2.5-0.5b-instruct-q4-k-m
          path: qwen2.5-0.5b-instruct-q4_k_m.gguf
          compression-level: 0
          retention-days: 1
          if-no-files-found: error
